<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Che Plast">
  <meta name="theme-color" content="#0d0800">
  <title>Che Plast</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <style>
    /* ── CHICHA PERUANA ───────────────────────────── */
    :root {
      --bg:      #0d0800;
      --bg2:     #1a1000;
      --border:  #3d2200;
      --yellow:  #FFD700;
      --pink:    #FF006E;
      --orange:  #FF5500;
      --dim:     #CC8833;
      --bright:  #FFB833;
      --bar-h:   46px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: var(--bg);
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }

    /* ════════════════════════════════════════════
       SHELL
    ════════════════════════════════════════════ */
    #shell {
      display: flex; flex-direction: column;
      height: 100%;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bot);
    }

    /* ════════════════════════════════════════════
       HEADER DE LOGIN
    ════════════════════════════════════════════ */
    #login-top {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 20px; flex-shrink: 0;
      background: linear-gradient(90deg, #200a00, #0d0800);
      border-bottom: 3px solid var(--yellow);
    }
    #login-top img {
      width: 38px; height: 38px; border-radius: 8px;
      box-shadow: 0 0 12px rgba(255,215,0,.45);
    }
    #login-top h1 {
      font-size: 20px; font-weight: 900;
      letter-spacing: .14em; color: var(--yellow);
      text-shadow: 0 0 16px rgba(255,215,0,.5);
    }
    #login-top p {
      font-size: 11px; color: var(--dim);
      margin-left: auto; letter-spacing: .02em;
    }

    /* ════════════════════════════════════════════
       FOOTER DE LOGIN (botón continuar)
    ════════════════════════════════════════════ */
    #login-bottom {
      display: flex; align-items: center;
      justify-content: space-between;
      gap: 14px; padding: 12px 20px; flex-shrink: 0;
      background: linear-gradient(90deg, #0d0800, #200a00);
      border-top: 3px solid var(--pink);
    }
    #login-hint {
      font-size: 12px; color: var(--dim); flex: 1;
    }
    #btn-continue {
      padding: 11px 26px; flex-shrink: 0;
      background: var(--pink); color: #fff;
      border: none; border-radius: 7px;
      font-size: 14px; font-weight: 900;
      letter-spacing: .07em; text-transform: uppercase;
      cursor: pointer; white-space: nowrap;
      transition: background .15s;
      box-shadow: 0 4px 16px rgba(255,0,110,.4);
    }
    #btn-continue:hover  { background: #FF3399; }
    #btn-continue:active { transform: scale(.97); }

    /* ════════════════════════════════════════════
       BARRA DE PESTAÑAS (visible tras login)
    ════════════════════════════════════════════ */
    #tab-bar {
      display: none; align-items: stretch;
      background: var(--bg); height: var(--bar-h);
      overflow-x: auto; overflow-y: hidden;
      scrollbar-width: none; flex-shrink: 0;
      border-bottom: 2px solid var(--border);
      -webkit-overflow-scrolling: touch;
    }
    #tab-bar.visible { display: flex; }
    #tab-bar::-webkit-scrollbar { display: none; }

    .tab {
      display: flex; align-items: center; gap: 5px;
      padding: 0 14px;
      min-width: 110px; max-width: 170px; min-height: var(--bar-h);
      white-space: nowrap; cursor: pointer;
      color: var(--dim); font-size: 13px; font-weight: 600;
      flex-shrink: 0; border-right: 1px solid var(--border);
      transition: background .15s, color .12s;
      user-select: none; -webkit-user-select: none;
      position: relative;
    }
    .tab:hover { background: var(--bg2); color: var(--bright); }
    .tab.active { background: var(--yellow); color: #0d0800; font-weight: 800; }
    .tab.active::after {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: var(--pink);
    }
    .tab-label { overflow: hidden; text-overflow: ellipsis; flex: 1; }

    .tab-close {
      display: flex; align-items: center; justify-content: center;
      width: 19px; height: 19px; border: none;
      background: transparent; border-radius: 50%;
      cursor: pointer; font-size: 11px; flex-shrink: 0;
      color: inherit; opacity: .5;
      transition: background .12s, opacity .12s;
    }
    .tab-close:hover { background: var(--orange); color: #fff; opacity: 1; }

    /* ── Botones derechos ─────────────────────────── */
    .bar-right {
      display: flex; align-items: stretch;
      margin-left: auto; flex-shrink: 0;
    }
    #btn-reload {
      display: flex; align-items: center; justify-content: center;
      width: 46px; min-height: var(--bar-h);
      border: none; border-left: 1px solid var(--border);
      background: var(--bg2); color: var(--dim);
      font-size: 19px; cursor: pointer;
      transition: background .15s, color .15s;
    }
    #btn-reload:hover { background: var(--border); color: var(--yellow); }
    #btn-reload:active { color: var(--pink); }

    #btn-new {
      display: flex; align-items: center; gap: 6px;
      padding: 0 16px; min-height: var(--bar-h);
      border: none; border-left: 1px solid var(--border);
      background: var(--orange); color: #fff;
      font-size: 13px; font-weight: 800;
      letter-spacing: .04em; text-transform: uppercase;
      cursor: pointer; white-space: nowrap;
      transition: background .15s;
    }
    #btn-new:hover { background: var(--pink); }

    /* ════════════════════════════════════════════
       ÁREA DE CONTENIDO
    ════════════════════════════════════════════ */
    #content {
      flex: 1; position: relative;
      overflow: hidden; background: var(--bg);
    }
    .frame-wrap {
      position: absolute; inset: 0;
      display: none; overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    .frame-wrap.active { display: block; }
    .frame-wrap::before {
      content: 'Cargando…';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--dim);
      font-size: 15px; font-weight: 600;
      pointer-events: none; transition: opacity .4s;
    }
    .frame-wrap.loaded::before { opacity: 0; pointer-events: none; }
    iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ── Toast ────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--yellow); color: #0d0800;
      padding: 8px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 800;
      opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s; z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Mobile ───────────────────────────────────── */
    @media (max-width: 600px) {
      :root { --bar-h: 44px; }
      .tab { min-width: 80px; padding: 0 10px; font-size: 12px; }
      #btn-new { padding: 0 10px; font-size: 11px; gap: 3px; }
      #btn-reload { width: 40px; font-size: 16px; }
      #login-hint { display: none; }
    }
  </style>
</head>

<body>
<div id="shell">

  <!-- ── Header login ───────────────────────────── -->
  <div id="login-top">
    <img src="icons/apple-touch-icon.png" alt="Che Plast">
    <h1>CHE PLAST</h1>
    <p>Iniciá sesión y luego presioná Continuar</p>
  </div>

  <!-- ── Barra de pestañas (post-login) ─────────── -->
  <div id="tab-bar">
    <div class="bar-right">
      <button id="btn-reload" title="Recargar pestaña activa">&#x27F3;</button>
      <button id="btn-new">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
          <path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        Nuevo Comprobante
      </button>
    </div>
  </div>

  <!-- ── Iframes ────────────────────────────────── -->
  <div id="content"></div>

  <!-- ── Footer login ───────────────────────────── -->
  <div id="login-bottom">
    <span id="login-hint">Completá el login en la pantalla de arriba, luego presioná el botón</span>
    <button id="btn-continue">Ya ingresé &mdash; Continuar &#x279C;</button>
  </div>

</div>
<div id="toast"></div>

<script>
/* ────────────────────────────────────────────
   CONFIG
   Las 3 pestañas de organizatic comparten UN
   SOLO iframe → una sola sesión, sin conflicto.
   Caja y Nuevo Comprobante tienen iframes propios.
──────────────────────────────────────────── */
const ORG_BASE  = 'https://cheplast.organizatic.com/principal';
const ORG_HASHES = [
  { label: 'Inicio',         hash: '#/' },
  { label: 'Notas de Venta', hash: '#/notas-venta' },
  { label: 'Documentos',     hash: '#/documentos' },
];
const CAJA_URL  = 'https://ahhm0699.github.io/PROGRAMA-CAJA/';
const DYN_LABEL = 'Nuevo Comprobante';
const DYN_URL   = ORG_BASE + '#/documentos/crear';

/* ────────────────────────────────────────────
   DOM
──────────────────────────────────────────── */
const loginTop    = document.getElementById('login-top');
const loginBottom = document.getElementById('login-bottom');
const tabBar      = document.getElementById('tab-bar');
const barRight    = tabBar.querySelector('.bar-right');
const btnNew      = document.getElementById('btn-new');
const btnReload   = document.getElementById('btn-reload');
const btnContinue = document.getElementById('btn-continue');
const contentEl   = document.getElementById('content');
const toastEl     = document.getElementById('toast');

/* ────────────────────────────────────────────
   TOAST
──────────────────────────────────────────── */
let toastTimer;
function showToast(msg, ms = 2000) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms);
}

/* ────────────────────────────────────────────
   IFRAME COMPARTIDO para las 3 pestañas org
   Se crea al inicio y siempre vive en #content.
   Durante el login muestra el formulario de acceso.
   Después del login, navega entre hashes sin recargar.
──────────────────────────────────────────── */
const orgWrap  = document.createElement('div');
orgWrap.className = 'frame-wrap active';   // visible durante login

const orgFrame = document.createElement('iframe');
orgFrame.src   = ORG_BASE + '#/';
orgFrame.allow = 'clipboard-read; clipboard-write; fullscreen';
orgFrame.addEventListener('load', () => orgWrap.classList.add('loaded'));
orgWrap.appendChild(orgFrame);
contentEl.appendChild(orgWrap);

let currentOrgHash = '#/';

/* ────────────────────────────────────────────
   ESTADO
──────────────────────────────────────────── */
let tabs     = [];   // { id, el, wrap?, frame?, isOrg, orgHash?, fixed, _loaded }
let active   = 0;
let loggedIn = false;
let uid      = 0;

/* ────────────────────────────────────────────
   CREAR PESTAÑA ORG (comparte orgFrame)
──────────────────────────────────────────── */
function addOrgTab(label, hash) {
  const id = 't' + (++uid);
  const el = makeTabEl(label, true, id);
  tabs.push({ id, el, isOrg: true, orgHash: hash, fixed: true, _loaded: false });
  return tabs.length - 1;
}

/* ────────────────────────────────────────────
   CREAR PESTAÑA CON IFRAME PROPIO
──────────────────────────────────────────── */
function addIframeTab(label, url, fixed) {
  const id   = 't' + (++uid);
  const wrap  = document.createElement('div');
  wrap.className = 'frame-wrap';
  const frame = document.createElement('iframe');
  frame.dataset.src = url;
  frame.allow = 'clipboard-read; clipboard-write; fullscreen';
  frame.addEventListener('load', () => wrap.classList.add('loaded'));
  wrap.appendChild(frame);
  contentEl.appendChild(wrap);
  const el = makeTabEl(label, fixed, id);
  tabs.push({ id, el, wrap, frame, isOrg: false, fixed, _loaded: false });
  return tabs.length - 1;
}

/* ────────────────────────────────────────────
   ELEMENTO DE PESTAÑA
──────────────────────────────────────────── */
function makeTabEl(label, fixed, id) {
  const el = document.createElement('div');
  el.className = 'tab';
  el.setAttribute('role', 'tab');
  el.setAttribute('aria-selected', 'false');
  el.innerHTML = `<span class="tab-label" title="${label}">${label}</span>`;

  if (!fixed) {
    const btn = document.createElement('button');
    btn.className = 'tab-close';
    btn.innerHTML = '&#x2715;';
    btn.setAttribute('aria-label', 'Cerrar');
    btn.addEventListener('click', e => { e.stopPropagation(); removeTab(id); });
    el.appendChild(btn);
  }

  el.addEventListener('click', () => {
    const i = tabs.findIndex(t => t.id === id);
    if (i >= 0) setActive(i);
  });

  // Doble toque = recargar (móvil)
  let lastTap = 0;
  el.addEventListener('touchend', () => {
    const now = Date.now();
    const i = tabs.findIndex(t => t.id === id);
    if (i === active && now - lastTap < 320) reloadActive();
    lastTap = now;
  });

  tabBar.insertBefore(el, barRight);
  return el;
}

/* ────────────────────────────────────────────
   CERRAR PESTAÑA
──────────────────────────────────────────── */
function removeTab(id) {
  const dynCount = tabs.filter(t => !t.fixed).length;
  if (dynCount <= 1) { showToast('Debe quedar al menos un comprobante abierto'); return; }
  const i = tabs.findIndex(t => t.id === id);
  if (i < 0 || tabs[i].fixed) return;
  tabs[i].el.remove();
  tabs[i].wrap?.remove();
  tabs.splice(i, 1);
  setActive(Math.min(active, tabs.length - 1));
}

/* ────────────────────────────────────────────
   ACTIVAR PESTAÑA
──────────────────────────────────────────── */
function setActive(i) {
  active = i;
  const t = tabs[i];
  if (!t) return;

  tabs.forEach((tt, idx) => {
    const on = idx === i;
    tt.el.classList.toggle('active', on);
    tt.el.setAttribute('aria-selected', String(on));
    if (!tt.isOrg && tt.wrap) {
      tt.wrap.classList.toggle('active', on);
      // Carga lazy: primera activación
      if (on && !tt._loaded) {
        tt.frame.src = tt.frame.dataset.src;
        tt._loaded = true;
      }
    }
  });

  if (t.isOrg) {
    orgWrap.classList.add('active');
    // Navegar solo si el hash cambió (sin recargar la página)
    if (t.orgHash !== currentOrgHash) {
      orgFrame.src = ORG_BASE + t.orgHash;
      currentOrgHash = t.orgHash;
    }
  } else {
    orgWrap.classList.remove('active');
  }

  tabs[i].el.scrollIntoView({ block: 'nearest', inline: 'nearest' });
}

/* ────────────────────────────────────────────
   RECARGAR PESTAÑA ACTIVA
   Usá el botón ⟳ de la barra — es la forma
   más confiable. F5 puede quedar capturado por
   el iframe si tiene el foco.
──────────────────────────────────────────── */
function reloadActive() {
  const t = tabs[active];
  if (!t) return;

  if (t.isOrg) {
    orgWrap.classList.remove('loaded');
    orgFrame.src = 'about:blank';
    const hash = t.orgHash;
    setTimeout(() => {
      orgFrame.src = ORG_BASE + hash;
      currentOrgHash = hash;
    }, 30);
  } else {
    const src = t.frame.dataset.src;
    t.wrap.classList.remove('loaded');
    t._loaded = false;
    t.frame.src = 'about:blank';
    setTimeout(() => { t.frame.src = src; t._loaded = true; }, 30);
  }
  showToast('Recargando…');
}

/* ────────────────────────────────────────────
   PESTAÑA DINÁMICA
──────────────────────────────────────────── */
function addDynamic() {
  const i = addIframeTab(DYN_LABEL, DYN_URL, false);
  setActive(i);
}

/* ────────────────────────────────────────────
   LOGIN → APP
   El orgFrame ya tiene la sesión iniciada.
   Al presionar Continuar se revela la barra
   y las demás pestañas cargan lazy.
──────────────────────────────────────────── */
btnContinue.addEventListener('click', () => {
  if (loggedIn) return;
  loggedIn = true;

  loginTop.style.display    = 'none';
  loginBottom.style.display = 'none';
  tabBar.classList.add('visible');

  // Construir pestañas org (comparten orgFrame)
  ORG_HASHES.forEach(t => addOrgTab(t.label, t.hash));
  // Caja con iframe propio (lazy)
  addIframeTab('Caja', CAJA_URL, true);
  // Primera pestaña dinámica (lazy)
  addIframeTab(DYN_LABEL, DYN_URL, false);

  // Activar Inicio — orgFrame ya está en #/
  currentOrgHash = '#/';
  setActive(0);
});

/* ────────────────────────────────────────────
   BOTONES
──────────────────────────────────────────── */
btnReload.addEventListener('click', reloadActive);
btnNew.addEventListener('click', addDynamic);

/* ────────────────────────────────────────────
   F5 — interceptar cuando la app tiene foco
──────────────────────────────────────────── */
window.addEventListener('keydown', e => {
  if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
    e.preventDefault();
    e.stopImmediatePropagation();
    if (loggedIn) reloadActive();
  }
}, true);

/* ────────────────────────────────────────────
   PWA
──────────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
