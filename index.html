<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Che Plast">
  <meta name="theme-color" content="#0d0800">
  <title>Che Plast</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <style>
    :root {
      --bg:     #0d0800;
      --bg2:    #1a1000;
      --border: #3d2200;
      --yellow: #FFD700;
      --pink:   #FF006E;
      --orange: #FF5500;
      --dim:    #CC8833;
      --bright: #FFB833;
      --safe-top: env(safe-area-inset-top,  0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: var(--bg);
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }

    /* ── SHELL ──────────────────────────────────── */
    #shell {
      display: flex; flex-direction: column; height: 100%;
      padding-top: var(--safe-top); padding-bottom: var(--safe-bot);
    }

    /* ── HEADER ─────────────────────────────────── */
    #header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; flex-shrink: 0;
      background: linear-gradient(90deg, #200a00, #0d0800);
      border-bottom: 3px solid var(--yellow);
    }
    #header img { width: 34px; height: 34px; border-radius: 7px; box-shadow: 0 0 10px rgba(255,215,0,.4); }
    #header h1  { font-size: 18px; font-weight: 900; letter-spacing: .14em; color: var(--yellow); text-shadow: 0 0 14px rgba(255,215,0,.4); }

    /* ── BOTONES DE SECCIÓN ──────────────────────── */
    /*  Organizatic → abren en el navegador real    */
    /*  Caja        → embebida con iframe            */
    #nav {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 10px 12px; flex-shrink: 0;
      background: var(--bg2);
      border-bottom: 2px solid var(--border);
    }

    .nav-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 14px; border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--bg); color: var(--dim);
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all .15s;
      white-space: nowrap; text-decoration: none;
      flex-shrink: 0;
      -webkit-user-select: none; user-select: none;
    }
    .nav-btn:hover  { background: var(--bg2); color: var(--bright); border-color: var(--dim); }
    .nav-btn.active { background: var(--yellow); color: #0d0800; border-color: var(--yellow); }

    /* Botón Nuevo Comprobante */
    #btn-new {
      margin-left: auto;
      background: var(--orange); color: #fff;
      border-color: var(--orange);
      font-weight: 900; letter-spacing: .04em;
    }
    #btn-new:hover { background: var(--pink); border-color: var(--pink); color: #fff; }

    /* ── CONTENIDO ────────────────────────────────
       - Splash para las pestañas de organizatic
         (se abren en el navegador, no en iframe)
       - iframe solo para Caja (GitHub Pages)
    ─────────────────────────────────────────────── */
    #content { flex: 1; position: relative; overflow: hidden; }

    /* Splash pantalla */
    #splash {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; padding: 24px;
      background: radial-gradient(ellipse at center, #1f0c00 0%, #0d0800 70%);
    }
    #splash img { width: 90px; height: 90px; border-radius: 18px; box-shadow: 0 0 30px rgba(255,215,0,.35); }
    #splash h2  { font-size: 22px; font-weight: 900; color: var(--yellow); letter-spacing: .1em; text-shadow: 0 0 16px rgba(255,215,0,.4); text-align: center; }
    #splash p   { font-size: 13px; color: var(--dim); text-align: center; max-width: 280px; line-height: 1.6; }
    #splash-open {
      padding: 13px 36px; border: none; border-radius: 8px;
      background: var(--pink); color: #fff;
      font-size: 15px; font-weight: 900;
      letter-spacing: .07em; text-transform: uppercase;
      cursor: pointer; transition: background .15s;
      box-shadow: 0 4px 18px rgba(255,0,110,.4);
      text-decoration: none; display: inline-block;
    }
    #splash-open:hover { background: #FF3399; }
    #splash-hint { font-size: 11px; color: #664422; text-align: center; }

    /* iframe Caja */
    #caja-wrap {
      position: absolute; inset: 0;
      display: none; overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    #caja-wrap.active { display: block; }
    #caja-wrap::before {
      content: 'Cargando Caja…';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--dim); font-size: 15px; font-weight: 600;
      pointer-events: none; transition: opacity .4s;
    }
    #caja-wrap.loaded::before { opacity: 0; pointer-events: none; }
    #caja-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    /* Reload bar for Caja */
    #caja-bar {
      display: none; align-items: center; gap: 8px;
      padding: 0 12px; height: 36px; flex-shrink: 0;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    #caja-bar.active { display: flex; }
    #btn-reload-caja {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg); color: var(--dim);
      font-size: 12px; font-weight: 700; cursor: pointer;
      transition: background .15s, color .15s;
    }
    #btn-reload-caja:hover { background: var(--border); color: var(--yellow); }

    /* ── TOAST ────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--yellow); color: #0d0800;
      padding: 8px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 800;
      opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s; z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── MOBILE ─────────────────────────────────────── */
    @media (max-width: 500px) {
      #nav { gap: 6px; padding: 8px 10px; }
      .nav-btn { padding: 8px 10px; font-size: 12px; gap: 5px; }
      #btn-new { margin-left: 0; width: 100%; justify-content: center; }
      #splash h2 { font-size: 19px; }
    }
  </style>
</head>
<body>
<div id="shell">

  <!-- Header -->
  <div id="header">
    <img src="icons/apple-touch-icon.png" alt="Che Plast">
    <h1>CHE PLAST</h1>
  </div>

  <!-- Barra de recarga (solo visible en Caja) -->
  <div id="caja-bar">
    <button id="btn-reload-caja">&#x27F3; Recargar Caja</button>
  </div>

  <!-- Navegación -->
  <div id="nav">
    <!-- pestañas inyectadas por JS -->
    <button class="nav-btn" id="btn-new">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
        <path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      Nuevo Comprobante
    </button>
  </div>

  <!-- Contenido -->
  <div id="content">
    <!-- Splash (org tabs) -->
    <div id="splash">
      <img src="icons/apple-touch-icon.png" alt="">
      <h2 id="splash-title">CHE PLAST</h2>
      <p id="splash-desc">Seleccioná una sección para abrirla en el navegador.</p>
      <a id="splash-open" href="#" target="_blank" rel="noopener noreferrer">ABRIR &#x279C;</a>
      <span id="splash-hint">Las páginas del sistema se abren en el navegador para evitar errores de sesión.</span>
    </div>

    <!-- Caja embebida (solo esta, sin CSRF) -->
    <div id="caja-wrap">
      <iframe
        id="caja-frame"
        src="https://ahhm0699.github.io/PROGRAMA-CAJA/"
        allow="clipboard-read; clipboard-write; fullscreen">
      </iframe>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
/* ── CONFIG ─────────────────────────────────────────
   Organizatic tiene protección CSRF (Laravel) que
   bloquea iframes desde otros dominios (error 419).
   Solución: abrir en el navegador, igual que
   grupo-montenegro. Solo Caja se embebe (GitHub Pages).
─────────────────────────────────────────────────── */
const ORG_BASE = 'https://cheplast.organizatic.com/principal';

const FIXED_TABS = [
  { label: 'Inicio',         url: ORG_BASE + '#/',                  isOrg: true  },
  { label: 'Notas de Venta', url: ORG_BASE + '#/notas-venta',       isOrg: true  },
  { label: 'Documentos',     url: ORG_BASE + '#/documentos',        isOrg: true  },
  { label: 'Caja',           url: 'https://ahhm0699.github.io/PROGRAMA-CAJA/', isOrg: false },
];
const DYN_URL = ORG_BASE + '#/documentos/crear';

/* ── DOM ─────────────────────────────────────────── */
const nav          = document.getElementById('nav');
const btnNew       = document.getElementById('btn-new');
const splash       = document.getElementById('splash');
const splashTitle  = document.getElementById('splash-title');
const splashDesc   = document.getElementById('splash-desc');
const splashOpen   = document.getElementById('splash-open');
const cajaWrap     = document.getElementById('caja-wrap');
const cajaFrame    = document.getElementById('caja-frame');
const cajaBar      = document.getElementById('caja-bar');
const btnReloadCaja= document.getElementById('btn-reload-caja');
const toastEl      = document.getElementById('toast');

cajaFrame.addEventListener('load', () => cajaWrap.classList.add('loaded'));

/* ── TOAST ───────────────────────────────────────── */
let toastTimer;
function showToast(msg, ms = 2000) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms);
}

/* ── ESTADO ──────────────────────────────────────── */
let activeIdx = -1;   // -1 = pantalla de bienvenida
let buttons   = [];   // elementos de botón

/* ── CREAR BOTONES FIJOS ─────────────────────────── */
FIXED_TABS.forEach((t, i) => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn';
  btn.textContent = t.label;
  btn.addEventListener('click', () => activateTab(i));
  nav.insertBefore(btn, btnNew);
  buttons.push(btn);
});

/* ── ACTIVAR PESTAÑA ─────────────────────────────── */
function activateTab(i) {
  activeIdx = i;
  const t = FIXED_TABS[i];

  // Actualizar estado visual de botones
  buttons.forEach((b, idx) => b.classList.toggle('active', idx === i));

  if (t.isOrg) {
    // Organizatic → abrir en el navegador real
    // (iframe bloqueado por CSRF/Laravel 419)
    cajaWrap.classList.remove('active');
    cajaBar.classList.remove('active');
    splash.style.display = 'flex';

    splashTitle.textContent = t.label;
    splashDesc.textContent  = 'Se abrirá en el navegador para evitar errores de sesión del sistema.';
    splashOpen.href = t.url;

    // En móvil y desktop: abrir en browser externo
    window.open(t.url, '_blank', 'noopener,noreferrer');
    showToast(`Abriendo ${t.label}…`);

  } else {
    // Caja → embebida (GitHub Pages, sin CSRF)
    splash.style.display = 'none';
    cajaWrap.classList.add('active');
    cajaBar.classList.add('active');
  }
}

/* ── NUEVO COMPROBANTE ───────────────────────────── */
btnNew.addEventListener('click', () => {
  window.open(DYN_URL, '_blank', 'noopener,noreferrer');
  showToast('Abriendo Nuevo Comprobante…');
});

/* ── RECARGAR CAJA ───────────────────────────────── */
btnReloadCaja.addEventListener('click', () => {
  cajaWrap.classList.remove('loaded');
  cajaFrame.src = 'about:blank';
  setTimeout(() => { cajaFrame.src = 'https://ahhm0699.github.io/PROGRAMA-CAJA/'; }, 30);
  showToast('Recargando Caja…');
});

/* ── F5 → recarga Caja si está activa ───────────── */
window.addEventListener('keydown', e => {
  if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
    e.preventDefault();
    e.stopImmediatePropagation();
    if (activeIdx === 3) btnReloadCaja.click();
  }
}, true);

/* ── PWA ─────────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
