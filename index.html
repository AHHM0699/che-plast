<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Che Plast">
  <meta name="theme-color" content="#1a1f3c">
  <title>Che Plast</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <style>
    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bar-bg:    #1a1f3c;
      --bar-hover: #252b52;
      --tab-active:#ffffff;
      --accent:    #3b82f6;
      --btn-new:   #16a34a;
      --btn-hover: #15803d;
      --text-dim:  #8b9dc3;
      --text-dark: #1e2130;
      --bar-h:     48px;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: var(--bar-bg);
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }

    /* ── Layout ─────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bot);
    }

    /* ── Tab bar ────────────────────────────────────── */
    #tab-bar {
      display: flex;
      align-items: stretch;
      background: var(--bar-bg);
      height: var(--bar-h);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      flex-shrink: 0;
      border-bottom: 2px solid #0d1124;
      -webkit-overflow-scrolling: touch;
    }
    #tab-bar::-webkit-scrollbar { display: none; }

    /* ── Individual tab ─────────────────────────────── */
    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 16px;
      min-width: 120px;
      max-width: 180px;
      min-height: var(--bar-h);
      white-space: nowrap;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      flex-shrink: 0;
      border-right: 1px solid #0d1124;
      transition: background .15s, color .15s;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
    }
    .tab:hover { background: var(--bar-hover); color: #fff; }
    .tab.active {
      background: var(--tab-active);
      color: var(--text-dark);
      font-weight: 600;
    }
    .tab.active::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 0 0 3px 3px;
    }
    .tab-label { overflow: hidden; text-overflow: ellipsis; flex: 1; }

    /* close button on dynamic tabs */
    .tab-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      flex-shrink: 0;
      padding: 0;
      color: inherit;
      opacity: .6;
      transition: background .15s, opacity .15s;
    }
    .tab-close:hover { background: #ef4444; color: #fff; opacity: 1; }

    /* ── Nueva Venta button ─────────────────────────── */
    #btn-new {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 16px;
      min-height: var(--bar-h);
      flex-shrink: 0;
      border: none;
      background: var(--btn-new);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
      margin-left: auto;
    }
    #btn-new:hover { background: var(--btn-hover); }

    /* ── Content area ───────────────────────────────── */
    #content {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    .frame-wrap {
      position: absolute;
      inset: 0;
      display: none;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    .frame-wrap.active { display: block; }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Mobile adjustments ─────────────────────────── */
    @media (max-width: 600px) {
      :root { --bar-h: 44px; }
      .tab { min-width: 90px; padding: 0 10px; font-size: 12px; }
      #btn-new { padding: 0 12px; font-size: 12px; }
    }
  </style>
</head>

<body>
<div id="app">
  <div id="tab-bar">
    <!-- tabs injected by JS -->
    <button id="btn-new">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Nueva Venta
    </button>
  </div>
  <div id="content"></div>
</div>

<script>
  // ── Config ──────────────────────────────────────────
  const FIXED = [
    { label: 'Inicio',         url: 'https://cheplast.organizatic.com/principal#/' },
    { label: 'Notas de Venta', url: 'https://cheplast.organizatic.com/principal#/notas-venta' },
    { label: 'Documentos',     url: 'https://cheplast.organizatic.com/principal#/documentos' },
    { label: 'Caja',           url: 'https://ahhm0699.github.io/PROGRAMA-CAJA/' },
  ];
  const DYN_LABEL = 'Nueva Venta';
  const DYN_URL   = 'https://cheplast.organizatic.com/principal#/documentos/crear';
  const FIXED_N   = FIXED.length;

  // ── State ───────────────────────────────────────────
  const tabBar = document.getElementById('tab-bar');
  const btnNew = document.getElementById('btn-new');
  const content = document.getElementById('content');
  let tabs = [];        // { el, wrap, fixed }
  let active = 0;
  let uid = 0;

  // ── Helpers ─────────────────────────────────────────
  function addTab(label, url, fixed) {
    const id = 'f' + (++uid);

    // Tab element
    const el = document.createElement('div');
    el.className = 'tab';
    el.dataset.id = id;
    el.setAttribute('role', 'tab');
    el.setAttribute('aria-selected', 'false');
    el.innerHTML = `<span class="tab-label">${label}</span>`;

    if (!fixed) {
      const btn = document.createElement('button');
      btn.className = 'tab-close';
      btn.innerHTML = '✕';
      btn.setAttribute('aria-label', 'Cerrar pestaña');
      btn.addEventListener('click', e => { e.stopPropagation(); removeTab(id); });
      el.appendChild(btn);
    }

    el.addEventListener('click', () => {
      const i = tabs.findIndex(t => t.id === id);
      if (i >= 0) setActive(i);
    });

    // Insert before the New button
    tabBar.insertBefore(el, btnNew);

    // iframe wrapper
    const wrap = document.createElement('div');
    wrap.className = 'frame-wrap';
    wrap.id = id;
    const frame = document.createElement('iframe');
    frame.src = url;
    frame.allow = 'clipboard-read; clipboard-write; fullscreen';
    frame.setAttribute('loading', 'lazy');
    wrap.appendChild(frame);
    content.appendChild(wrap);

    tabs.push({ id, el, wrap, fixed });
    return tabs.length - 1;
  }

  function removeTab(id) {
    const dynCount = tabs.filter(t => !t.fixed).length;
    if (dynCount <= 1) return; // always keep ≥ 1 dynamic tab
    const i = tabs.findIndex(t => t.id === id);
    if (i < 0 || tabs[i].fixed) return;
    tabs[i].el.remove();
    tabs[i].wrap.remove();
    tabs.splice(i, 1);
    setActive(Math.min(active, tabs.length - 1));
  }

  function setActive(i) {
    active = i;
    tabs.forEach((t, idx) => {
      const on = idx === i;
      t.el.classList.toggle('active', on);
      t.el.setAttribute('aria-selected', on);
      t.wrap.classList.toggle('active', on);
    });
    // Scroll tab into view on mobile
    tabs[i]?.el.scrollIntoView({ block: 'nearest', inline: 'nearest' });
  }

  function addDynamic() {
    const i = addTab(DYN_LABEL, DYN_URL, false);
    setActive(i);
  }

  // ── Init ────────────────────────────────────────────
  FIXED.forEach(t => addTab(t.label, t.url, true));
  addDynamic();
  setActive(0);

  btnNew.addEventListener('click', addDynamic);

  // ── PWA service worker ───────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
