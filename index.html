<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Che Plast">
  <meta name="theme-color" content="#1c2800">
  <title>Che Plast</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Colors derived from logo (lime/yellow-green palette) */
      --bar-bg:      #1c2800;
      --bar-hover:   #2c3e00;
      --bar-border:  #0e1700;
      --accent:      #93b800;   /* logo lime green */
      --accent-dim:  #5a7200;
      --tab-active:  #f5fce8;   /* very light lime tint */
      --tab-active-txt: #1c2800;
      --btn-bg:      #6b8800;
      --btn-hover:   #4e6500;
      --text-dim:    #8fa066;
      --text-light:  #c8d8a0;
      --bar-h:       46px;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bot:    env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: var(--bar-bg);
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bot);
    }

    /* ── Tab bar ──────────────────────────────────── */
    #tab-bar {
      display: flex;
      align-items: stretch;
      background: var(--bar-bg);
      height: var(--bar-h);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      flex-shrink: 0;
      border-bottom: 2px solid var(--bar-border);
      -webkit-overflow-scrolling: touch;
    }
    #tab-bar::-webkit-scrollbar { display: none; }

    /* ── Tab ──────────────────────────────────────── */
    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 15px;
      min-width: 120px;
      max-width: 185px;
      min-height: var(--bar-h);
      white-space: nowrap;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      flex-shrink: 0;
      border-right: 1px solid var(--bar-border);
      transition: background .15s, color .15s;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
    }
    .tab:hover { background: var(--bar-hover); color: var(--text-light); }
    .tab.active {
      background: var(--tab-active);
      color: var(--tab-active-txt);
      font-weight: 600;
    }
    /* Active indicator bar */
    .tab.active::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
    }

    .tab-label { overflow: hidden; text-overflow: ellipsis; flex: 1; }

    /* ── Close button ─────────────────────────────── */
    .tab-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      border-radius: 50%;
      cursor: pointer;
      font-size: 11px;
      flex-shrink: 0;
      padding: 0;
      color: inherit;
      opacity: .55;
      transition: background .12s, opacity .12s;
    }
    .tab-close:hover { background: #c0392b; color: #fff; opacity: 1; }

    /* ── Nuevo Comprobante button ──────────────────── */
    #btn-new {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 16px;
      min-height: var(--bar-h);
      flex-shrink: 0;
      border: none;
      background: var(--btn-bg);
      color: #e8f4c0;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
      margin-left: auto;
      letter-spacing: .01em;
    }
    #btn-new:hover { background: var(--btn-hover); }
    #btn-new svg { flex-shrink: 0; }

    /* ── Loading indicator ────────────────────────── */
    .frame-wrap::before {
      content: 'Cargando…';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: var(--text-dim);
      background: var(--bar-bg);
      pointer-events: none;
      opacity: 1;
      transition: opacity .3s;
    }
    .frame-wrap.loaded::before { opacity: 0; pointer-events: none; }

    /* ── Content area ─────────────────────────────── */
    #content {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bar-bg);
    }

    .frame-wrap {
      position: absolute;
      inset: 0;
      display: none;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    .frame-wrap.active { display: block; }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── F5 toast hint (desktop only) ─────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #333;
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Mobile ───────────────────────────────────── */
    @media (max-width: 600px) {
      :root { --bar-h: 44px; }
      .tab { min-width: 85px; padding: 0 10px; font-size: 12px; }
      #btn-new { padding: 0 12px; font-size: 12px; gap: 4px; }
    }
  </style>
</head>

<body>
<div id="app">
  <div id="tab-bar">
    <button id="btn-new" aria-label="Abrir nuevo comprobante">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      Nuevo Comprobante
    </button>
  </div>
  <div id="content"></div>
</div>
<div id="toast"></div>

<script>
  // ── Config ──────────────────────────────────────────
  const FIXED = [
    { label: 'Inicio',         url: 'https://cheplast.organizatic.com/principal#/' },
    { label: 'Notas de Venta', url: 'https://cheplast.organizatic.com/principal#/notas-venta' },
    { label: 'Documentos',     url: 'https://cheplast.organizatic.com/principal#/documentos' },
    { label: 'Caja',           url: 'https://ahhm0699.github.io/PROGRAMA-CAJA/' },
  ];
  const DYN_LABEL = 'Nuevo Comprobante';
  const DYN_URL   = 'https://cheplast.organizatic.com/principal#/documentos/crear';
  const FIXED_N   = FIXED.length;

  // ── DOM refs ────────────────────────────────────────
  const tabBar = document.getElementById('tab-bar');
  const btnNew = document.getElementById('btn-new');
  const content = document.getElementById('content');
  const toast  = document.getElementById('toast');

  let tabs   = [];   // { id, el, wrap, frame, url, fixed }
  let active = 0;
  let uid    = 0;

  // ── Toast ───────────────────────────────────────────
  let toastTimer;
  function showToast(msg, ms = 1800) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), ms);
  }

  // ── Create tab ──────────────────────────────────────
  function addTab(label, url, fixed) {
    const id = 't' + (++uid);

    // Tab pill
    const el = document.createElement('div');
    el.className = 'tab';
    el.setAttribute('role', 'tab');
    el.innerHTML = `<span class="tab-label" title="${label}">${label}</span>`;

    if (!fixed) {
      const btn = document.createElement('button');
      btn.className = 'tab-close';
      btn.innerHTML = '&#x2715;';
      btn.setAttribute('aria-label', 'Cerrar');
      btn.addEventListener('click', e => { e.stopPropagation(); removeTab(id); });
      el.appendChild(btn);
    }

    el.addEventListener('click', () => {
      const i = tabs.findIndex(t => t.id === id);
      if (i >= 0) setActive(i);
    });

    // Double-tap active tab on mobile → reload
    let tapTime = 0;
    el.addEventListener('touchend', () => {
      const now = Date.now();
      const i = tabs.findIndex(t => t.id === id);
      if (i === active && now - tapTime < 320) reloadActive();
      tapTime = now;
    });

    tabBar.insertBefore(el, btnNew);

    // iframe wrapper (LAZY: src not set yet)
    const wrap = document.createElement('div');
    wrap.className = 'frame-wrap';
    const frame = document.createElement('iframe');
    frame.dataset.src = url;   // store URL, load lazily
    frame.allow = 'clipboard-read; clipboard-write; fullscreen';
    frame.addEventListener('load', () => wrap.classList.add('loaded'));
    wrap.appendChild(frame);
    content.appendChild(wrap);

    tabs.push({ id, el, wrap, frame, url, fixed });
    return tabs.length - 1;
  }

  // ── Remove tab ──────────────────────────────────────
  function removeTab(id) {
    const dynCount = tabs.filter(t => !t.fixed).length;
    if (dynCount <= 1) {
      showToast('Debe quedar al menos un comprobante abierto');
      return;
    }
    const i = tabs.findIndex(t => t.id === id);
    if (i < 0 || tabs[i].fixed) return;
    tabs[i].el.remove();
    tabs[i].wrap.remove();
    tabs.splice(i, 1);
    setActive(Math.min(active, tabs.length - 1));
  }

  // ── Activate tab ────────────────────────────────────
  function setActive(i) {
    active = i;
    tabs.forEach((t, idx) => {
      const on = idx === i;
      t.el.classList.toggle('active', on);
      t.el.setAttribute('aria-selected', on);
      t.wrap.classList.toggle('active', on);

      // Lazy-load: set src on first activation
      if (on && !t.frame.src) {
        t.frame.src = t.frame.dataset.src;
      }
    });
    tabs[i]?.el.scrollIntoView({ block: 'nearest', inline: 'nearest' });
  }

  // ── Reload active iframe ─────────────────────────────
  function reloadActive() {
    const t = tabs[active];
    if (!t) return;
    const origSrc = t.frame.dataset.src;
    t.wrap.classList.remove('loaded');
    t.frame.src = 'about:blank';
    setTimeout(() => { t.frame.src = origSrc; }, 30);
    showToast('Recargando…');
  }

  // ── Add dynamic tab ─────────────────────────────────
  function addDynamic() {
    const i = addTab(DYN_LABEL, DYN_URL, false);
    setActive(i);
  }

  // ── Keyboard: F5 reloads active iframe only ──────────
  document.addEventListener('keydown', e => {
    if (e.key === 'F5') {
      e.preventDefault();
      reloadActive();
    }
  });

  // ── Init ────────────────────────────────────────────
  FIXED.forEach(t => addTab(t.label, t.url, true));
  addDynamic();
  setActive(0);   // Only tab 0 loads immediately; others load on first click

  btnNew.addEventListener('click', addDynamic);

  // ── PWA ─────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
